name: Windows CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

env:
  SCCACHE_DIR: ${{ github.workspace }}\.sccache
  SCCACHE_CACHE_SIZE: "2G"
  CMAKE_C_COMPILER_LAUNCHER: sccache
  CMAKE_CXX_COMPILER_LAUNCHER: sccache

jobs:
  build:
    name: Windows x64 (clang-cl + ninja + sccache)
    runs-on: windows-2022
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup MSVC dev environment (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install CMake + Ninja
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "3.31.6"
          ninjaVersion: latest

      - name: Use runner LLVM (clang-cl, clang-tidy, clang-format)
        # windows-2022 ships LLVM (20.x at time of writing) under C:\Program Files\LLVM.
        # Don't reinstall via choco -- pinning an older version fails when the runner already has a newer one.
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path $llvmBin)) {
            choco install -y llvm
            $llvmBin = "C:\Program Files\LLVM\bin"
          }
          echo $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-windows-${{ hashFiles('CMakeLists.txt','cmake/**','CMakePresets.json') }}-${{ github.sha }}
          restore-keys: |
            sccache-windows-${{ hashFiles('CMakeLists.txt','cmake/**','CMakePresets.json') }}-
            sccache-windows-

      - name: Verify tools
        run: |
          (Get-Command clang-cl).Source
          clang-cl --version
          (Get-Command clang-tidy).Source
          (Get-Command rc).Source
          cmake --version | Select-Object -First 1
          ninja --version
          sccache --version

      - name: Configure
        run: cmake --preset windows-ci

      - name: Build
        run: cmake --build --preset windows-ci

      - name: Test
        run: ctest --preset windows-ci

      - name: sccache stats
        if: always()
        run: sccache --show-stats

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure --color=always
